<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyLux-SignUp</title>
    <!--css link-->
    <link rel="stylesheet" href="./style/style.css">
    <link rel="icon" type="image/x-icon" href="../main/pageicon.jpg">
    <!--link to awsome fonts-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" 
    integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" 
    crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>
<body>
    <div class="globallook"> 
        <div class="glass-card">
            <h1>Signup Form</h1>
            <form id="loginForm" action="../main/index.html">
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter your username" required>
                    <i class="fas fa-user"></i>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                    <i class="fas fa-lock"></i>
                </div>
                <div class="input-group">
                    <label for="password">Confirm Password</label>
                    <input type="password" id="password" placeholder="Re-Enter your password" required>
                    <i class="fas fa-lock"></i>
                </div>
                <div class="remember-forgot">
                    <div class="remember">
                        <input type="checkbox" id="remember">
                        <label for="remember">Remember me</label>
                    </div>
                    <div class="forgot">
                        <a href="../main/index.html">Back to site?</a>
                    </div>
                </div>

                <a href="../main/index.html">
                    <button type="submit" class="btn" id="signupButton">Signup</button>
                </a>

                <div class="register-link">Already had an account?
                    <a href="../login/index.html">Login</a>
                </div>
            </form>
        </div>
    </div>

    <div class="floating-elements">
        <div class="floating-element">
        <div class="floating-element"></div>
        <div class="floating-element"></div>
        <div class="floating-element"></div>
    </div>
</body>

    <!--external script link-->
    <script src="./script/script.js"></script>
</html>
